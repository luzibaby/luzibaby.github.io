<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的内在观察空间</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont;
    background: #f7f6f3;
    color: #333;
    padding: 20px;
    line-height: 1.6;
}

.container {
    max-width: 700px;
    margin: auto;
}

h1 {
    font-size: 26px;
}

.section {
    background: white;
    padding: 18px;
    margin-top: 16px;
    border-radius: 12px;
}

textarea {
    width: 100%;
    height: 120px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌿 我的内在观察空间</h1>

<div class="section">
<h3>🧭 我的职业与状态</h3>
<p>这里写你的职业状态</p>
</div>

<div class="section">
<h3>✨ 我的天赋与优势</h3>
<p>这里写你的优势</p>
</div>

<div class="section">
<h3>⚠️ 我需要警惕的思维</h3>
<p>这里写你的思维模式</p>
</div>

<div class="section">
<h3>📝 今日观察</h3>
<textarea id="note"></textarea>
<button onclick="saveNote()">保存</button>
</div>

</div>

<script>
function saveNote(){
    localStorage.setItem("note", document.getElementById("note").value);
}
window.onload = function(){
    document.getElementById("note").value = localStorage.getItem("note") || "";
}
</script>

</body>
</html>
